<header class="header">
    <div class="logo">
        <a routerLink="/" (click)="closeMenu()">
            <div>承檍生技</div>
        </a>
        <a class="home-link" routerLink="/" aria-label="home" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-house-door-fill" viewBox="0 0 16 16">
        <path d="M6.5 14.5v-3.505c0-.245.25-.495.5-.495h2c.25 0 .5.25.5.5v3.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5"/>
        </svg>
        </a>    
    </div>

    <button
        class="menu-toggle"
        type="button"
        aria-label="menu"
        [class.open]="isMenuOpen()"
        [attr.aria-expanded]="isMenuOpen()"
        (click)="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav class="menu" [class.open]="isMenuOpen()">
        <a routerLink="/about" (click)="closeMenu()">關於我們</a>
        <a routerLink="/news" (click)="closeMenu()">最新消息</a>
        <a routerLink="/product" (click)="closeMenu()">商品</a>
    </nav>

    <div class="top-right">
        <div>登入</div>
        <a class="cart-link" routerLink="/cart" aria-label="cart" (click)="closeMenu()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2Zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2ZM7.16 14.26c-.75 0-1.41-.41-1.75-1.03L2 4H0V2h3.31l.94 2H22l-3.4 8.34c-.31.76-1.04 1.26-1.86 1.26H7.42l-.9 1.64H20V17H7c-1.52 0-2.48-1.63-1.75-2.97l.91-1.77ZM5.2 6l2.22 5.6h9.32L19.02 6H5.2Z" />
            </svg>
        </a>
    </div>
</header>
