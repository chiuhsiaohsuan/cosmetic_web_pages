<header class="header">

    <!-- Logo -->
    <div class="logo">

        <a routerLink="/" (click)="closeMenu()">
            承檍生技
        </a>

        <a
            class="home-link"
            routerLink="/"
            aria-label="首頁"
            (click)="closeMenu()">

            <svg xmlns="http://www.w3.org/2000/svg"
                 width="24"
                 height="24"
                 fill="currentColor"
                 viewBox="0 0 16 16">

                <path d="M6.5 14.5v-3.505c0-.245.25-.495.5-.495h2c.25 0 .5.25.5.5v3.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5"/>
            </svg>

        </a>

    </div>

    <!-- 漢堡 -->
    <button
        class="menu-toggle"
        type="button"
        (click)="toggleMenu()"
        [class.open]="isMenuOpen()">

        <span></span>
        <span></span>
        <span></span>

    </button>

    <!-- Menu -->
    <nav
        class="menu"
        [class.open]="isMenuOpen()">

        <!-- 關於我們 -->

    <div class="menu-item">

        <a routerLink="/about">
            關於我們
        </a>

        <button
            class="arrow-btn"
            (click)="toggleAbout($event)">
            ⌄
        </button>


        <div class="submenu"
            [class.mobile-open]="aboutOpen()">

            <a
                routerLink="/about/team"
                (click)="closeMenu()">
                經營團隊
            </a>

            <a
                routerLink="/about/vision"
                (click)="closeMenu()">
                願景
            </a>

        </div>

    </div>

        <!-- 最新消息 -->

        <a
            routerLink="/news"
            (click)="closeMenu()">

            最新消息

        </a>

        <!-- 商品 -->

        <a
            routerLink="/product"
            (click)="closeMenu()">

            商品

        </a>

        <!-- Blog -->

        <div class="menu-item">

            <a routerLink="/blog">
                部落格
            </a>
                <button
                    class="arrow-btn"
                    (click)="toggleBlog($event)">
                    ⌄
                </button>
            <div class="submenu"
                [class.mobile-open]="blogOpen()">

                <a
                    routerLink="/blog/share"
                    (click)="closeMenu()">

                    使用者分享

                </a>

                <a
                    routerLink="/blog/knowledge"
                    (click)="closeMenu()">

                    保養知識

                </a>

                <a
                    routerLink="/blog/trend"
                    (click)="closeMenu()">

                    保養趨勢

                </a>

            </div>

        </div>

    </nav>

    <!-- Right -->

    <div class="top-right">
        @if(isLogin()) {
            <span>
            您好，{{userName}}
            </span>
            <button class="logout-btn" (click)="logout()">
                登出
            </button>

        }
        @else {

        <a class="login-link" routerLink="/login">
            登入
        </a>

        }
        <a
            class="cart-link"
            routerLink="/cart"
            aria-label="購物車"
            (click)="closeMenu()">

            <svg
                viewBox="0 0 24 24">

                <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2Zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2ZM7.16 14.26c-.75 0-1.41-.41-1.75-1.03L2 4H0V2h3.31l.94 2H22l-3.4 8.34c-.31.76-1.04 1.26-1.86 1.26H7.42l-.9 1.64H20V17H7c-1.52 0-2.48-1.63-1.75-2.97l.91-1.77ZM5.2 6l2.22 5.6h9.32L19.02 6H5.2Z"/>

            </svg>
             @if(cartCount() > 0){

                <span class="badge">
                {{cartCount()}}
                </span>

            }
        </a>

    </div>

</header>

@if (isMenuOpen()) {

<div
    class="menu-backdrop"
    (click)="closeMenu()">

</div>

}
