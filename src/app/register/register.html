<div class="register-container">
    <form class="register-form" (ngSubmit)="register()">

        <h2>會員註冊</h2>

        <div class="input-group">
            <label for="name">姓名</label>
            <input type="text" id="name" [(ngModel)]="name" name="name" placeholder="請輸入姓名">
        </div>
        <div class="input-group">
            <label for="birthday">出生年月日</label>
            <input type="date" id="birthday" [(ngModel)]="birthday" name="birthday">
        </div>
        <div class="input-group">
            <label for="email">電子郵件</label>
            <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="請輸入 Email">
        </div>

        <div class="input-group">
            <label for="phone">手機</label>
            <input type="tel" id="phone" [(ngModel)]="phone" name="phone" placeholder="請輸入手機號碼">
        </div>

        <div class="input-group">
            <label for="password">密碼</label>
            <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="請輸入密碼">
        </div>

        <div class="input-group">
            <label for="confirm-password">確認密碼</label>
            <input type="password" id="confirm-password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="再次輸入密碼">
            @if(password !== confirmPassword && confirmPassword !== '') {
                <p class="error">
                    兩次輸入的密碼不一致
                </p>
            }
        </div>

        <button type="submit">註冊</button>

        <p class="login-link">
            已經有帳號？
            <a routerLink="/login">返回登入</a>
        </p>
    </form>
</div>
